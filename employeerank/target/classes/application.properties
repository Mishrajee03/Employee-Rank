# Server
# Render automatically assigns a dynamic port; fallback to 8080 for local development
server.port=${PORT:8080}
server.servlet.context-path=/

# Application
spring.application.name=EmployeeRank

# Database - MySQL (Production dynamic placeholders)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/employeerank_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Mishrajee@03}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Thymeleaf (Keep if you have server-side templates)
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# JWT (Saves a backup secret, but override this in Render dashboard!)
app.jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationEmployeeRank2024SecureKey!@#$}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# File Upload (Note: Render's filesystem is ephemeral. Uploaded files delete on restarts unless using Render Disks)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/

# Mail (Configure securely via Render environment variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Scheduling
app.scheduling.monthly-result.cron=0 0 0 L * ?

# Cache
spring.cache.type=simple

# Logging
logging.level.com.employeerank=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Springdoc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method